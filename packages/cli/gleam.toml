name = "bygg"
version = "0.0.1"
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
bygg_core = { path = "../core" }
glint = ">= 1.2.1 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
filepath = ">= 1.1.2 and < 2.0.0"
gleam_community_ansi = ">= 1.4.4 and < 2.0.0"
snag = ">= 1.2.0 and < 2.0.0"
argv = ">= 1.0.2 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"

[tools.queso]
entry = "bygg"
targets = ["aarch64-macos", "x86_64-linux-static", "x86_64-windows"]
strip_beam = false
compression_level = 3
full_erts = true
