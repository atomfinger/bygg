name: Deploy web to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      changed: ${{ steps.read.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from gleam.toml
        id: read
        run: |
          VERSION=$(grep '^version' packages/web/gleam.toml \
            | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/web-v$VERSION" | grep -q .; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.18.x"
          gleam-version: "1.16.0"
          rebar3-version: "3"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install npm dependencies
        run: npm ci
        working-directory: packages/web
      - name: Inject version into version.gleam
        working-directory: packages/web
        run: |
          VERSION=${{ needs.version.outputs.version }}
          echo "pub const version = \"$VERSION\"" > src/bygg_web/version.gleam
      - name: Build web
        run: gleam run -m lustre/dev build --minify
        working-directory: packages/web
      - name: Fix asset paths for GitHub Pages subdirectory
        working-directory: packages/web/dist
        run: |
          sed -i 's|"/bygg_web\.|"./bygg_web.|g' index.html
          sed -i "s|'/bygg_web\.|'./bygg_web.|g" index.html
          sed -i 's|"/logo\.|"./logo.|g' index.html
          sed -i "s|'/logo\.|'./logo.|g" index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist
  deploy:
    needs: [version, build]
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  tag:
    needs: [version, deploy]
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag the release
        run: |
          git tag "web-v${{ needs.version.outputs.version }}"
          git push origin "web-v${{ needs.version.outputs.version }}"
