name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.18.x"
          gleam-version: "1.16.0"
          rebar3-version: "3"
      - name: Test core package
        run: cd packages/core && gleam test -- --module bygg_core_test
      - name: Test cli package
        run: cd packages/cli && gleam test
      - name: Check formatting
        run: |
          (cd packages/core && gleam format --check src test)
          (cd packages/cli && gleam format --check src)
      - name: Check version constraints in sync
        run: python3 scripts/sync_versions.py --check

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.18.x"
          gleam-version: "1.16.0"
          rebar3-version: "3"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Restore hex dep cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/gleam
          key: gleam-hex-${{ hashFiles('scripts/seed/manifest.toml') }}
          restore-keys: gleam-hex-
      - name: Pre-warm dep cache
        run: cd scripts/seed && gleam deps download
      - name: Run no-Docker integration tests
        run: cd packages/core && gleam test -- --tag no_docker
