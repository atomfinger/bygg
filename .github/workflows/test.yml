name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.16.0"
          rebar3-version: "3"
      - name: Test core package
        run: cd packages/core && gleam test
      - name: Test cli package
        run: cd packages/cli && gleam test
      - name: Check formatting
        run: |
          (cd packages/core && gleam format --check src test)
          (cd packages/cli && gleam format --check src)
